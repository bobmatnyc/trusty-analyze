# Dependabot configuration for trusty-analyze.
#
# Why: keeps cargo and GitHub Actions dependencies current with grouped weekly
# PRs so security advisories and minor/patch bumps don't pile up. Path deps
# inside this workspace (trusty-analyzer-*) are managed via versioning, not
# Dependabot.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      # Roll up small/patch bumps into one PR per week.
      minor-and-patch:
        update-types:
          - minor
          - patch
      # Group tree-sitter language grammar crates together (they tend to move
      # in lockstep with the tree-sitter core).
      tree-sitter:
        patterns:
          - "tree-sitter*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
