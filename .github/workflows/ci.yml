# Continuous Integration for the trusty-analyze Rust workspace.
#
# Runs formatting, lint, tests, and documentation checks across all crates
# on every push to main and every pull request. Mirrors the trusty-common
# repo's CI so consolidated developer experience stays consistent.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout trusty-common (for [patch.crates-io])
        uses: actions/checkout@v5
        with:
          repository: bobmatnyc/trusty-common
          path: trusty-common-ci

      - name: Rewrite [patch.crates-io] paths for CI layout
        run: sed -i 's|\.\./trusty-common/crates/|trusty-common-ci/crates/|g' Cargo.toml

      - name: Install Rust toolchain (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache fastembed models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: fastembed-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: fastembed-${{ runner.os }}-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

  docs:
    name: Docs (stable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # Treat rustdoc warnings (broken intra-doc links, etc.) as errors.
      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --all-features --no-deps
