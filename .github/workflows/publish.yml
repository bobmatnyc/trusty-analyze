# Publishes the publishable crates in the trusty-analyze workspace to crates.io.
#
# Triggered by:
#   - Push of a tag matching v* (e.g. v0.1.0)
#   - Manual workflow_dispatch (with optional dry-run mode)
#   - Repository dispatch (type: publish) from trusty-common's publish workflow
#
# Cross-repo dependency:
#   The shared `trusty-common` and `trusty-contracts` crates are published
#   from the trusty-common repo and consumed here via crates.io. The analyzer-
#   specific crates listed below are published from THIS repo.
#
# Workspace publishability map:
#   PUBLISHED (uploaded to crates.io):
#     1. trusty-analyzer-types   — no intra-workspace deps
#     2. trusty-analyzer-lang    — depends on trusty-analyzer-types
#     3. trusty-analyzer-core    — depends on trusty-analyzer-types + trusty-analyzer-lang
#     4. trusty-analyzer-mcp     — depends on trusty-analyzer-types + trusty-analyzer-core
#
#   NOT PUBLISHED (publish = false in Cargo.toml; workspace-internal):
#     - trusty-embedder          — collides with an unrelated `trusty-embedder`
#                                  crate already on crates.io
#     - trusty-analyzer-service  — transitively depends on trusty-embedder
#     - trusty-analyzer (bin)    — transitively depends on trusty-embedder
#
#   The binary `trusty-analyzer` is distributed via GitHub Releases and
#   `cargo install --git https://github.com/bobmatnyc/trusty-analyze`.
#
# Required repository secret:
#   CARGO_REGISTRY_TOKEN — crates.io API token with publish scope.

name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (publish --dry-run, skip actual upload)"
        type: boolean
        default: false
  repository_dispatch:
    types:
      - publish

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # ── Quality gate ──────────────────────────────────────────────────────
      - name: Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (workspace)
        run: cargo test --workspace

      # ── Publish ───────────────────────────────────────────────────────────
      # --no-verify skips re-building from a clean temp dir; we already built
      # and tested above so this is safe and saves ~5 min of CI time.
      # Dry-run path: passes --dry-run so nothing is actually uploaded.

      - name: Publish trusty-analyzer-types
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-types --dry-run
          else
            cargo publish -p trusty-analyzer-types --no-verify
          fi

      - name: Wait for index propagation (trusty-analyzer-types)
        if: ${{ inputs.dry_run != true }}
        run: sleep 20

      - name: Publish trusty-analyzer-lang
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-lang --dry-run
          else
            cargo publish -p trusty-analyzer-lang --no-verify
          fi

      - name: Wait for index propagation (trusty-analyzer-lang)
        if: ${{ inputs.dry_run != true }}
        run: sleep 20

      - name: Publish trusty-analyzer-core
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-core --dry-run
          else
            cargo publish -p trusty-analyzer-core --no-verify
          fi

      - name: Wait for index propagation (trusty-analyzer-core)
        if: ${{ inputs.dry_run != true }}
        run: sleep 20

      - name: Publish trusty-analyzer-mcp
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-mcp --dry-run
          else
            cargo publish -p trusty-analyzer-mcp --no-verify
          fi

      # Note: trusty-embedder, trusty-analyzer-service, and the trusty-analyzer
      # binary are intentionally NOT published. See header comment for details.
