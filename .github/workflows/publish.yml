# Publishes the single-crate `trusty-analyzer` package to crates.io.
#
# Triggered by:
#   - Push of a tag matching v* (e.g. v0.1.0)
#   - Manual workflow_dispatch (with optional dry-run mode)
#   - Repository dispatch (type: publish) from trusty-common's publish workflow
#
# Cross-repo dependency:
#   The shared `trusty-common` and `trusty-contracts` crates are published
#   from the trusty-common repo and consumed here via crates.io. The analyzer
#   itself ships as a single crate published from THIS repo.
#
# Required repository secret:
#   CARGO_REGISTRY_TOKEN — crates.io API token with publish scope.

name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (publish --dry-run, skip actual upload)"
        type: boolean
        default: false
  repository_dispatch:
    types:
      - publish

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish trusty-analyzer to crates.io
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout trusty-common (for [patch.crates-io])
        uses: actions/checkout@v5
        with:
          repository: bobmatnyc/trusty-common
          path: trusty-common-ci

      - name: Rewrite [patch.crates-io] paths for CI layout
        run: sed -i 's|\.\./trusty-common/crates/|trusty-common-ci/crates/|g' Cargo.toml

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # ── Quality gate ──────────────────────────────────────────────────────
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      # ── Publish ───────────────────────────────────────────────────────────
      # --no-verify skips re-building from a clean temp dir; we already built
      # and tested above so this is safe and saves CI time. It also avoids
      # tripping cargo's source-tree-modification check on the placeholder
      # `ui/dist/index.html` that build.rs writes when the UI hasn't been built.
      - name: Publish trusty-analyzer
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --no-verify --allow-dirty
          elif cargo search trusty-analyzer --limit 1 | grep -q "^trusty-analyzer = \"$VERSION\""; then
            echo "trusty-analyzer v$VERSION already published, skipping"
          else
            cargo publish --no-verify --allow-dirty
          fi
