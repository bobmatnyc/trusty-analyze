# Publishes the publishable crates in the trusty-analyze workspace to crates.io.
#
# Triggered by:
#   - Push of a tag matching v* (e.g. v0.1.0)
#   - Manual workflow_dispatch (with optional dry-run mode)
#   - Repository dispatch (type: publish) from trusty-common's publish workflow
#
# Cross-repo dependency:
#   The shared `trusty-common` and `trusty-contracts` crates are published
#   from the trusty-common repo and consumed here via crates.io. The analyzer-
#   specific crates listed below are published from THIS repo.
#
# Workspace publish order (each step depends only on previously published crates):
#   1. trusty-analyzer-types      — no intra-workspace deps
#   2. trusty-analyzer-lang       — depends on trusty-analyzer-types
#   3. trusty-analyzer-core       — depends on trusty-analyzer-types + trusty-analyzer-lang
#   4. trusty-analyzer-embedder   — depends on trusty-analyzer-core
#                                   (package name; lives in crates/trusty-embedder/.
#                                   Renamed from `trusty-embedder` to avoid colliding
#                                   with an unrelated crate already on crates.io.)
#   5. trusty-analyzer-service    — depends on types/core/lang/embedder
#   6. trusty-analyzer-mcp        — depends on types + core
#   7. trusty-analyzer (binary)   — depends on all of the above
#
# Required repository secret:
#   CARGO_REGISTRY_TOKEN — crates.io API token with publish scope.

name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (publish --dry-run, skip actual upload)"
        type: boolean
        default: false
  repository_dispatch:
    types:
      - publish

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout trusty-common (for [patch.crates-io])
        uses: actions/checkout@v4
        with:
          repository: bobmatnyc/trusty-common
          path: trusty-common-ci

      - name: Rewrite [patch.crates-io] paths for CI layout
        run: sed -i 's|\.\./trusty-common/crates/|trusty-common-ci/crates/|g' Cargo.toml

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # ── Quality gate ──────────────────────────────────────────────────────
      - name: Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (workspace)
        run: cargo test --workspace

      # ── Publish ───────────────────────────────────────────────────────────
      # --no-verify skips re-building from a clean temp dir; we already built
      # and tested above so this is safe and saves ~5 min of CI time.
      # Dry-run path: passes --dry-run so nothing is actually uploaded.

      - name: Publish trusty-analyzer-types
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-types --dry-run
          else
            out=$(cargo publish -p trusty-analyzer-types --no-verify --allow-dirty 2>&1); rc=$?; echo "$out"; if [ $rc -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $rc; fi
          fi

      - name: Wait for index propagation (trusty-analyzer-types)
        if: ${{ inputs.dry_run != true }}
        run: sleep 60

      - name: Publish trusty-analyzer-lang
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-lang --dry-run
          else
            out=$(cargo publish -p trusty-analyzer-lang --no-verify --allow-dirty 2>&1); rc=$?; echo "$out"; if [ $rc -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $rc; fi
          fi

      - name: Wait for index propagation (trusty-analyzer-lang)
        if: ${{ inputs.dry_run != true }}
        run: sleep 60

      - name: Publish trusty-analyzer-core
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-core --dry-run
          else
            out=$(cargo publish -p trusty-analyzer-core --no-verify --allow-dirty 2>&1); rc=$?; echo "$out"; if [ $rc -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $rc; fi
          fi

      - name: Wait for index propagation (trusty-analyzer-core)
        if: ${{ inputs.dry_run != true }}
        run: sleep 60

      - name: Publish trusty-analyzer-embedder
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-embedder --dry-run
          else
            out=$(cargo publish -p trusty-analyzer-embedder --no-verify --allow-dirty 2>&1); rc=$?; echo "$out"; if [ $rc -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $rc; fi
          fi

      - name: Wait for index propagation (trusty-analyzer-embedder)
        if: ${{ inputs.dry_run != true }}
        run: sleep 60

      - name: Publish trusty-analyzer-service
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-service --dry-run
          else
            out=$(cargo publish -p trusty-analyzer-service --no-verify --allow-dirty 2>&1); rc=$?; echo "$out"; if [ $rc -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $rc; fi
          fi

      - name: Wait for index propagation (trusty-analyzer-service)
        if: ${{ inputs.dry_run != true }}
        run: sleep 60

      - name: Publish trusty-analyzer-mcp
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer-mcp --dry-run
          else
            out=$(cargo publish -p trusty-analyzer-mcp --no-verify --allow-dirty 2>&1); rc=$?; echo "$out"; if [ $rc -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $rc; fi
          fi

      - name: Wait for index propagation (trusty-analyzer-mcp)
        if: ${{ inputs.dry_run != true }}
        run: sleep 60

      - name: Publish trusty-analyzer (binary)
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish -p trusty-analyzer --dry-run
          else
            out=$(cargo publish -p trusty-analyzer --no-verify --allow-dirty 2>&1); rc=$?; echo "$out"; if [ $rc -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $rc; fi
          fi
